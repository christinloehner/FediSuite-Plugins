<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Plugin Admin</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #0b1220;
        color: #e2e8f0;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      .wrap {
        padding: 24px;
      }
      .card {
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.88);
        padding: 24px;
      }
      .eyebrow {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.14);
        color: #cffafe;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 16px 0 8px;
      }
      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
      }
      pre {
        margin: 20px 0 0;
        padding: 16px;
        border-radius: 16px;
        background: rgba(2, 6, 23, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.16);
        overflow: auto;
      }
    </style>
    <script src="/plugin-sdk/fedisuite-plugin-web.js"></script>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="eyebrow">FediSuite Plugin</div>
        <h1>My Plugin Admin</h1>
        <p>This is the scaffolded plugin admin page. Replace it with your own UI.</p>
        <pre id="output">Initializing…</pre>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
